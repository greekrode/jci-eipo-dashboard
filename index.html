<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDX e-IPO Analytics · 2021–2026</title>
    <script>
      // Apply saved theme before paint (default light → no class). Avoids a flash for dark users.
      try { if (localStorage.theme === "dark") document.documentElement.classList.add("dark"); } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
